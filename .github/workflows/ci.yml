name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc -b --force

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

  # The drift gate: regenerate the TypeScript types and fail on any change,
  # including brand-new untracked outputs a bare `git diff` misses.
  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync dependencies
        run: uv sync --locked

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Regenerate types
        run: uv run scripts/generate_types.py

      - name: Fail on drift
        run: |
          status=$(git status --porcelain -- frontend/src/types/generated)
          if [ -n "$status" ]; then
            echo "generated types are out of date; run: uv run scripts/generate_types.py"
            echo "$status"
            git diff -- frontend/src/types/generated
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync dependencies
        run: uv sync --locked

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Type check the specs
        run: npx tsc -p ../tests/e2e
        working-directory: frontend

      - name: Run the smoke
        run: npx playwright test
        working-directory: frontend
